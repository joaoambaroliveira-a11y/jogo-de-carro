<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Insana</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas { border: 4px solid #fff; image-rendering: pixelated; }
    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 26px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
    }
    #gameOver {
      position: absolute;
      color: red;
      font-size: 48px;
      display: none;
      text-align: center;
      width: 100%;
      top: 40%;
    }
  </style>
</head>
<body>
  <div id="score">Distância: 0m | Vel: 0</div>
  <canvas id="game" width="400" height="600"></canvas>
  
  <div id="gameOver">
    GAME OVER<br>
    <span style="font-size:32px">Pontuação: <span id="finalScore">0</span></span><br><br>
    Pressione ESPAÇO para jogar novamente
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const gameOverScreen = document.getElementById("gameOver");
    const finalScoreElement = document.getElementById("finalScore");

    let gameRunning = true;
    let score = 0;
    let speed = 6;

    let player = { x: 175, y: 450, width: 52, height: 92, speed: 8 };

    let keys = {};
    let roadLines = [];
    let sameDirectionCars = [];
    let oncomingCars = [];

    let lastSpawn = 0; // controle para vir um por vez

    for (let i = 0; i < 12; i++) roadLines.push({ y: i * 70 });

    function drawRoad() {
      ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0a3";
      ctx.fillRect(0, 0, 55, canvas.height);
      ctx.fillRect(canvas.width - 55, 0, 55, canvas.height);

      ctx.strokeStyle = "#fff"; ctx.lineWidth = 6;
      roadLines.forEach(line => {
        ctx.beginPath();
        ctx.setLineDash([40, 30]);
        ctx.moveTo(canvas.width/2, line.y);
        ctx.lineTo(canvas.width/2, line.y + 60);
        ctx.stroke();
        ctx.setLineDash([]);
        line.y += speed;
        if (line.y > canvas.height) line.y = -100;
      });
    }

    function drawPlayer() {
      const x = player.x, y = player.y;
      ctx.fillStyle = "#00ff88"; ctx.fillRect(x + 4, y + 8, 44, 72);
      ctx.fillStyle = "#00cc6e"; ctx.fillRect(x + 8, y + 12, 36, 64);
      ctx.fillStyle = "#008844"; ctx.fillRect(x + 2, y + 12, 48, 8);
      ctx.fillStyle = "#ffee00"; ctx.fillRect(x + 8, y + 70, 10, 8); ctx.fillRect(x + 34, y + 70, 10, 8);
      ctx.fillStyle = "#ff2222"; ctx.fillRect(x + 6, y + 12, 8, 8); ctx.fillRect(x + 38, y + 12, 8, 8);
      ctx.fillStyle = "#112233"; ctx.fillRect(x + 12, y + 18, 28, 22); ctx.fillRect(x + 10, y + 42, 32, 15);
      ctx.fillStyle = "#111"; 
      ctx.fillRect(x + 6, y + 25, 10, 18); ctx.fillRect(x + 36, y + 25, 10, 18);
      ctx.fillRect(x + 6, y + 58, 10, 18); ctx.fillRect(x + 36, y + 58, 10, 18);
    }

    function drawBlueCar(x, y, rank) {
      const colors = ["#5dade2", "#3498db", "#2c7da0"];
      ctx.fillStyle = colors[rank-1];
      ctx.fillRect(x, y, 50, 85);
      ctx.fillStyle = "#87CEEB"; ctx.fillRect(x + 8, y + 18, 34, 22);
      ctx.fillStyle = "#111";
      ctx.fillRect(x + 6, y + 15, 10, 18); ctx.fillRect(x + 34, y + 15, 10, 18);
      ctx.fillRect(x + 6, y + 55, 10, 18); ctx.fillRect(x + 34, y + 55, 10, 18);

      ctx.fillStyle = "white";
      ctx.font = "bold 18px Arial";
      ctx.fillText(rank, x + 22, y + 48);
    }

    function canSpawn() {
      return sameDirectionCars.length === 0 && oncomingCars.length === 0;
    }

    function createSameDirectionCar() {
      if (Math.random() < 0.015 && canSpawn()) {
        const rank = Math.random() < 0.25 ? 3 : (Math.random() < 0.45 ? 2 : 1);
        sameDirectionCars.push({
          x: Math.random() * (canvas.width - 100) + 50,
          y: -100,
          width: 50,
          height: 85,
          speed: speed * (rank === 1 ? 0.35 : rank === 2 ? 0.60 : 0.85),
          rank: rank
        });
      }
    }

    function createOncomingCar() {
      if (Math.random() < 0.015 && canSpawn()) {
        oncomingCars.push({
          x: Math.random() * (canvas.width - 100) + 50,
          y: -100,
          width: 50,
          height: 85,
          speed: speed * 1.08
        });
      }
    }

    function drawCars() {
      sameDirectionCars.forEach((car, i) => {
        drawBlueCar(car.x, car.y, car.rank);
        car.y += car.speed;
        if (car.y > canvas.height) sameDirectionCars.splice(i, 1);
      });

      oncomingCars.forEach((car, i) => {
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(car.x, car.y, 50, 85);
        ctx.fillStyle = "#ffcc00"; ctx.fillRect(car.x + 8, car.y + 50, 34, 25);
        ctx.fillStyle = "#111";
        ctx.fillRect(car.x + 5, car.y + 15, 10, 18); ctx.fillRect(car.x + 35, car.y + 15, 10, 18);
        ctx.fillRect(car.x + 5, car.y + 55, 10, 18); ctx.fillRect(car.x + 35, car.y + 55, 10, 18);
        car.y += car.speed;
        if (car.y > canvas.height) oncomingCars.splice(i, 1);
      });
    }

    function checkCollision(car) {
      return player.x < car.x + car.width && player.x + player.width > car.x &&
             player.y < car.y + car.height && player.y + player.height > car.y;
    }

    function update() {
      if (!gameRunning) return;

      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;
      player.x = Math.max(60, Math.min(canvas.width - player.width - 60, player.x));

      score += 1;
      speed = 6 + Math.floor(score / 500);

      createSameDirectionCar();
      createOncomingCar();

      [...sameDirectionCars, ...oncomingCars].forEach(car => {
        if (checkCollision(car)) gameOver();
      });

      scoreElement.textContent = `Distância: ${Math.floor(score)}m | Vel: ${Math.floor(speed*10)}`;
    }

    function gameOver() {
      gameRunning = false;
      finalScoreElement.textContent = Math.floor(score);
      gameOverScreen.style.display = "block";
    }

    function loop() {
      drawRoad();
      drawPlayer();
      drawCars();
      update();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);
    window.addEventListener("keypress", e => { if (e.key === " " && !gameRunning) location.reload(); });

    loop();
  </script>
</body>
</html>.
